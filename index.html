                    background:isActive?COMPASS_COLOR[lv]:'#f9fafb',cursor:'pointer',
                    fontWeight:cur===lv?'bold':'normal',fontSize:'11px',color:cur===lv?'#374151':'#9ca3af'}}>
                  {lv}<br/><span style={{fontSize:'9px'}}>{COMPASS_LABEL[lv]}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* 入門精講章範囲 */}
        <div style={{marginBottom:'14px',background:'#f0fdf4',borderRadius:'8px',padding:'12px'}}>
          <p style={{fontSize:'12px',fontWeight:'bold',color:'#065f46',marginBottom:'6px'}}>
            📗 入門問題精講（{NYUMON_SETS[selSet.nyumon]?.label}）<span style={{fontSize:'10px',color:'#6b7280'}}>（全{nyumonLen}章）</span>
          </p>
          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
            <span style={{fontSize:'12px'}}>第</span>
            <input type="number" min="1" max={nyumonLen} value={curPlan.nyumonRange?.from||1}
              onChange={e=>setNR('from',Number(e.target.value))}
              style={{width:'56px',border:'2px solid #6ee7b7',borderRadius:'6px',padding:'5px',fontSize:'13px',textAlign:'center'}}/>
            <span style={{fontSize:'12px'}}>章 〜 第</span>
            <input type="number" min="1" max={nyumonLen} value={Math.min(curPlan.nyumonRange?.to||nyumonLen,nyumonLen)}
              onChange={e=>setNR('to',Number(e.target.value))}
              style={{width:'56px',border:'2px solid #6ee7b7',borderRadius:'6px',padding:'5px',fontSize:'13px',textAlign:'center'}}/>
            <span style={{fontSize:'12px'}}>章まで</span>
          </div>
        </div>

        {/* チャート章範囲 */}
        <div style={{marginBottom:'14px',background:selSet.bg,borderRadius:'8px',padding:'12px'}}>
          <p style={{fontSize:'12px',fontWeight:'bold',color:selSet.color,marginBottom:'6px'}}>
            📘 {selSet.label} <span style={{fontSize:'10px',color:'#6b7280'}}>（全{chartLen}章）</span>
          </p>
          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
            <span style={{fontSize:'12px'}}>第</span>
            <input type="number" min="1" max={chartLen} value={curPlan.chartRange?.from||1}
              onChange={e=>setCR('from',Number(e.target.value))}
              style={{width:'56px',border:`2px solid ${selSet.border}`,borderRadius:'6px',padding:'5px',fontSize:'13px',textAlign:'center'}}/>
            <span style={{fontSize:'12px'}}>章 〜 第</span>
            <input type="number" min="1" max={chartLen} value={Math.min(curPlan.chartRange?.to||chartLen,chartLen)}
              onChange={e=>setCR('to',Number(e.target.value))}
              style={{width:'56px',border:`2px solid ${selSet.border}`,borderRadius:'6px',padding:'5px',fontSize:'13px',textAlign:'center'}}/>
            <span style={{fontSize:'12px'}}>章まで</span>
          </div>
        </div>

        {/* リアルタイム宿題量表示 */}
        {hw&&(
          <div style={{background:'linear-gradient(135deg,#1e3a8a,#065f46)',borderRadius:'8px',padding:'12px',color:'white',marginBottom:'12px'}}>
            <p style={{fontWeight:'bold',fontSize:'12px',marginBottom:'6px'}}>📊 宿題量シミュレーション</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',marginBottom:'6px'}}>
              <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'6px',padding:'6px',textAlign:'center'}}>
                <p style={{fontSize:'10px',opacity:0.8}}>入門精講</p>
                <p style={{fontSize:'16px',fontWeight:'bold'}}>{hw.nTotal}問</p>
              </div>
              <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'6px',padding:'6px',textAlign:'center'}}>
                <p style={{fontSize:'10px',opacity:0.8}}>チャート</p>
                <p style={{fontSize:'16px',fontWeight:'bold'}}>{hw.cTotal}問</p>
              </div>
            </div>
            <div style={{background:'rgba(255,255,255,0.2)',borderRadius:'6px',padding:'6px',textAlign:'center'}}>
              <p style={{fontSize:'10px',opacity:0.8}}>合計 {hw.total}問 ÷ {hw.weeks}週</p>
              <p style={{fontSize:'18px',fontWeight:'bold'}}>週{hw.perWeek}問 / 1日{hw.perDay}問</p>
            </div>
          </div>
        )}

        <button onClick={save} style={{width:'100%',background:'#065f46',color:'white',border:'none',borderRadius:'10px',padding:'12px',fontWeight:'bold',fontSize:'14px',cursor:'pointer'}}>
          {msg||'💾 保存'}
        </button>
      </div>
    </div>
  );
}

function App(){
  const [phase,setPhase]=useState('login'); // login|teacher|students|loading|main|director
  const [role,setRole]=useState('');
  const [teachers,setTeachers]=useState(ALL_TEACHERS_DEFAULT);
  const [hsStudents,setHsStudents]=useState(HS_STUDENTS_DEFAULT);
  const [jhStudents,setJhStudents]=useState(JH_STUDENTS_DEFAULT);
  const [selTeacher,setSelTeacher]=useState('');
  const [selStudents,setSelStudents]=useState([]); // [{name,type:'hs'|'jh'}]
  const [loadMsg,setLoadMsg]=useState('');
  const [bgLoading,setBgLoading]=useState(false); // バックグラウンド読込中表示

  // 高校生データ
  const [hsRecords,setHsRecords]=useState({});
  const [hsPlans,setHsPlans]=useState({});

  // 小中学生データ
  const [jhRecords,setJhRecords]=useState({});
  const [jhTextbookOverrides,setJhTextbookOverrides]=useState({});
  const [jhTestRanges,setJhTestRanges]=useState({});
  const [jhDirectives,setJhDirectives]=useState({});
  const [jhSkipItems,setJhSkipItems]=useState({});

  // 共通UI
  const [activeStudentIdx,setActiveStudentIdx]=useState(0); // selStudentsの添字
  const [saveMsg,setSaveMsg]=useState('');
  const [activeHint,setActiveHint]=useState(null);
  const [activeSubjMap,setActiveSubjMap]=useState({});
  const [activeChapMap,setActiveChapMap]=useState({});
  const [activeTestRound,setActiveTestRound]=useState('t1');
  const [showTextbookModal,setShowTextbookModal]=useState(false);
  const [showTestRangeModal,setShowTestRangeModal]=useState(false);
  const [showDirectiveModal,setShowDirectiveModal]=useState(false);
  const [showHsAdjustModal,setShowHsAdjustModal]=useState(false);

  const flash=msg=>{setSaveMsg(msg);setTimeout(()=>setSaveMsg(''),2500);};

  // DB(chapters.json)ロード
  useEffect(()=>{
    fetch('chapters.json')
      .then(r=>r.json())
      .then(d=>{DB=d;})
      .catch(()=>{});
  },[]);

  // ログイン後：講師・生徒リストと軽量設定を先読み
  const handleLogin=async r=>{
    setRole(r);
    // ① まずキャッシュから即時読み込んで画面を進める（超高速）
    const cT=hsGetCached('koukou:teachers',ALL_TEACHERS_DEFAULT);
    const cHs=hsGetCached('koukou:students',HS_STUDENTS_DEFAULT);
    const cJh=jhGetCached('students',JH_STUDENTS_DEFAULT);
    const cTb=jhGetCached('textbookOverrides',{});
    const cTr=jhGetCached('testRanges',{});
    const cDv=jhGetCached('directives',{});
    const cSk=jhGetCached('skipItems',{});
    setTeachers(cT);setHsStudents(cHs);setJhStudents(cJh);
    setJhTextbookOverrides(cTb);setJhTestRanges(cTr);setJhDirectives(cDv);setJhSkipItems(cSk);
    setPhase('teacher');  // すぐ遷移
    // ② バックグラウンドで最新データを取得してUIを更新
    setBgLoading(true);
    (async()=>{
      const [t,hs,jh]=await Promise.all([
        hsGet('koukou:teachers',cT),
        hsGet('koukou:students',cHs),
        jhGet('students',cJh),
      ]);
      setTeachers(t);setHsStudents(hs);setJhStudents(jh);
      const [tb,tr,dv,sk]=await Promise.all([
        jhGet('textbookOverrides',cTb),
        jhGet('testRanges',cTr),
        jhGet('directives',cDv),
        jhGet('skipItems',cSk),
      ]);
      setJhTextbookOverrides(tb);setJhTestRanges(tr);setJhDirectives(dv);setJhSkipItems(sk);
      setBgLoading(false);
    })();
  };

  // 生徒選択後：選んだ生徒のデータだけ読む
  const handleStart=async selected=>{
    if(role==='director'){setSelStudents(selected);setPhase('director');return;}
    setSelStudents(selected);

    // ① キャッシュから即時読み込んで画面を進める
    const hsNames=selected.filter(x=>x.type==='hs').map(x=>x.name);
    const jhNeeded=selected.some(x=>x.type==='jh');
    const cNr={},cNp={};
    for(const fullName of hsNames){
      const n=stripGrade(fullName);  // ← stripGradeした名前をキーに統一
      cNr[n]=hsGetCached(`koukou:records:${n}`,{});
      const p=hsGetCached(`koukou:plan:${n}`,null);
      if(p) cNp[n]=p;
    }
    if(jhNeeded){
      const cJr=jhGetCached('records',{});
      setJhRecords(cJr);
    }
    setHsRecords(cNr);setHsPlans(cNp);
    setActiveStudentIdx(0);setPhase('main');

    // ② バックグラウンドで最新データを取得して上書き
    setBgLoading(true);
    (async()=>{
      const nr={...cNr},np={...cNp};
      for(const fullName of hsNames){
        const n=stripGrade(fullName);
        if(!n) continue;
        nr[n]=await hsGet(`koukou:records:${n}`,cNr[n]||{});
        const p=await hsGet(`koukou:plan:${n}`,null);
        if(p) np[n]=p;
      }
      if(jhNeeded){
        const jr=await jhGet('records',{});
        setJhRecords(jr);
      }
      setHsRecords(nr);setHsPlans(np);
      setBgLoading(false);
    })();
  };

  // 現在の生徒
  const curStu=selStudents[activeStudentIdx]||null;
  const curName=curStu?stripGrade(curStu.name):'';
  const curType=curStu?.type||'hs';

  // 高校生の記録操作
  const hsCycleStatus=async key=>{
    const cur=(hsRecords[curName]?.[key]||{status:'未'}).status;
    const next=CYCLE[cur];
    const nr={...(hsRecords[curName]||{}),[key]:{status:next,teacher:next!=='未'?selTeacher:'',date:next!=='未'?toDay():''}};
    setHsRecords(r=>({...r,[curName]:nr}));
    flash('💾 保存中...');
    await hsSet(`koukou:records:${curName}`,nr);
    flash('💾 保存しました');
  };

  const hsSkipToggle=async(key)=>{
    const plan=hsPlans[curName]||{};
    const cur=plan.skipItems||[];
    const next=cur.includes(key)?cur.filter(k=>k!==key):[...cur,key];
    const newPlan={...plan,skipItems:next};
    setHsPlans(p=>({...p,[curName]:newPlan}));
    await hsSet(`koukou:plan:${curName}`,newPlan);
    flash('✕ スキップ設定を保存しました');
  };

  // 小中学生の記録操作
  // 小中学生のrecordキーは生徒index（jhStudents配列内の位置）
  const getJhSi=name=>{
    const full=jhStudents.find(s=>s.startsWith(name+'（')||s===name);
    return jhStudents.indexOf(full);
  };
  const jhGetRecord=(si,key)=>jhRecords[si]?.[key]||{status:'未',teacher:'',date:''};
  const jhCycleStatus=async(si,key)=>{
    const cur=jhGetRecord(si,key).status;
    const next=STATUS_CYCLE[cur];
    const nr={...jhRecords,[si]:{...(jhRecords[si]||{}),[key]:{status:next,teacher:next!=='未'?selTeacher:'',date:next!=='未'?today():''}}};
    setJhRecords(nr);flash('💾 保存中...');
    await jhSet('records',nr);flash('💾 保存しました');
  };

  const jhSaveTextbook=async(si,vals)=>{
    const newOv={...jhTextbookOverrides,[si]:vals};
    setJhTextbookOverrides(newOv);
    await jhSet('textbookOverrides',newOv);
    setShowTextbookModal(false);flash('📚 テキスト設定を変更しました');
  };
  const jhSaveTestRange=async(key,data)=>{
    const nd={...jhTestRanges,[key]:data};setJhTestRanges(nd);
    await jhSet('testRanges',nd);flash('📝 テスト範囲を保存しました');
  };
  const jhSaveDirective=async(key,text)=>{
    const nd={...jhDirectives,[key]:text};setJhDirectives(nd);
    await jhSet('directives',nd);flash('📢 方針を保存しました');
  };
  const jhToggleSkip=async(grade,subjKey,itemId)=>{
    const key=`${grade}_${subjKey}`;
    const cur=jhSkipItems[key]||[];
    const ns=cur.includes(itemId)?cur.filter(id=>id!==itemId):[...cur,itemId];
    const updated={...jhSkipItems,[key]:ns};
    setJhSkipItems(updated);
    await jhSet('skipItems',updated);
    flash(cur.includes(itemId)?'↩ スキップ解除':'⏭ スキップ設定');
  };

  // 高校生サイドバー用サマリー
  const getHsSummary=idx=>{
    const stu=selStudents[idx];
    if(!stu||stu.type!=='hs') return{total:0,done:0};
    const n=stripGrade(stu.name);
    const rec=hsRecords[n]||{};
    const plan=hsPlans[n]||{};
    const ss=plan.textbookSet?SETS[plan.textbookSet]:null;
    if(!ss) return{total:0,done:0};
    const nyumonKey=ss.nyumon||'ia';
    const lv=plan.maxLevel||5;
    const nL=getNyumon(nyumonKey).length, cL=getChaps(ss.dataKey).length;
    const nFrom=Math.min(plan.nyumonRange?.from||1,nL),nTo=Math.min(plan.nyumonRange?.to||nL,nL);
    const cFrom=Math.min(plan.chartRange?.from||1,cL), cTo=Math.min(plan.chartRange?.to||cL,cL);
    const skipSet=new Set(plan.skipItems||[]);
    let t=0,d=0;
    getNyumon(nyumonKey).forEach((ch,ci)=>{
      if(ci+1<nFrom||ci+1>nTo) return;
      ch.items.forEach(it=>{if(skipSet.has(`IA_${it.id}`)) return;t++;if((rec[`IA_${it.id}`]||{status:'未'}).status==='◯')d++;});
    });
    getChaps(ss.dataKey).forEach((ch,ci)=>{
      if(ci+1<cFrom||ci+1>cTo) return;
      ch.items.forEach(it=>{if((it.level||1)>lv||skipSet.has(`CHART_${it.id}`)) return;t++;if((rec[`CHART_${it.id}`]||{status:'未'}).status==='◯')d++;});
    });
    return{total:t,done:d};
  };

  const getJhSummary=idx=>{
    const stu=selStudents[idx];
    if(!stu||stu.type!=='jh') return{total:0,done:0};
    const si=getJhSi(stripGrade(stu.name));
    if(si<0) return{total:0,done:0};
    const grade=extractGrade(jhStudents[si]||'');
    const subjects=GRADE_SUBJECTS[grade]||[];
    let t=0,d=0;
    subjects.forEach(subj=>{
      const override=jhTextbookOverrides[si]?.[subj];
      const defaultKey=(grade.startsWith('中')||grade.startsWith('小'))?`${grade}Y_${subj}`:`${grade}_${subj}`;
      const rawKey=override||defaultKey;
      if(rawKey&&rawKey.startsWith('none_')) return;
      const chs=CHAPTERS[rawKey]||[];
      const skKey=`${grade}_${subj}`;
      const skList=jhSkipItems[skKey]||[];
      chs.forEach(ch=>ch.items.forEach(it=>{
        if(skList.includes(it.id)) return;
        t++;if(jhGetRecord(si,`${subj}_${it.id}`).status==='◯')d++;
      }));
    });
    return{total:t,done:d};
  };

  const getSummary=idx=>{
    const stu=selStudents[idx];
    if(!stu) return{total:0,done:0};
    return stu.type==='hs'?getHsSummary(idx):getJhSummary(idx);
  };

  // ── フェーズ分岐 ──
  if(phase==='login') return <PasswordGate onPass={handleLogin}/>;
  if(phase==='teacher') return <TeacherSelectScreen bgLoading={bgLoading} teachers={teachers} role={role}
    onSelect={t=>{setSelTeacher(t);setPhase('students');}}
    onDelete={async t=>{
      const next=teachers.filter(x=>x!==t);
      setTeachers(next);
      await hsSet('koukou:teachers',next);
      await jhSet('teachers',next);
      flash('🗑 削除しました');
    }}
    onAdd={async name=>{
      const next=[...teachers,name];
      setTeachers(next);
      await hsSet('koukou:teachers',next);
      await jhSet('teachers',next);
      flash('➕ 追加しました');
    }}
  />;
  if(phase==='students') return(
    <StudentSelectScreen bgLoading={bgLoading} hsStudents={hsStudents} jhStudents={jhStudents}
      teacherName={selTeacher} role={role}
      onStart={handleStart}
      onBack={()=>setPhase('teacher')}/>
  );
  if(phase==='director') return(
    <DirectorSetting studentIdxs={selStudents.filter(s=>s.type==='hs').map(s=>hsStudents.indexOf(s.name))}
      allStudents={hsStudents} onBack={()=>setPhase('students')}/>
  );
  if(phase==='loading') return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#f0f4f8',gap:'16px'}}>
      <div style={{fontSize:'40px'}}>📖</div>
      <p style={{fontWeight:'bold',color:'#1e3a8a',fontSize:'18px'}}>データを読み込んでいます</p>
      <p style={{color:'#6b7280',fontSize:'14px'}}>{loadMsg}</p>
    </div>
  );

  // ── メイン画面 ──
  // 高校生用変数
  // ロードマップ対応：現在のステップを判定
  const curPlanRaw=hsPlans[curName]||{};
  const curPlanFull=migratePlan(curPlanRaw);
  const curRoadmap=curPlanFull.roadmap||[];
  const curRecords=hsRecords[curName]||{};
  const curSkipItems=curPlanFull.skipItems||[];
  const autoCurIdx=getAutoCurrentIdx(curRoadmap,curRecords,curSkipItems);
  // 手動上書きがあればそれを優先、なければ自動
  const stepIdx=(curPlanFull.currentIdx!==null&&curPlanFull.currentIdx!==undefined&&curPlanFull.currentIdx>=0&&curPlanFull.currentIdx<curRoadmap.length)?curPlanFull.currentIdx:autoCurIdx;
  const curStep=curRoadmap[stepIdx]||null;
  // 現在のステップを「curPlan」として扱う（既存コードとの互換のため）
  const curPlan=curStep?{...curStep,memo:curPlanFull.memo,skipItems:curPlanFull.skipItems}:curPlanFull;
  const curSet=curPlan.textbookSet?SETS[curPlan.textbookSet]:null;
  const chartChaps=curSet?getChaps(curSet.dataKey):null;
  const nyumonKey=curSet?.nyumon||'ia';
  const nyumonLabel=NYUMON_SETS[nyumonKey]?.label||'数ⅠA';
  const iaChaps=getNyumon(nyumonKey);
  const lv=curPlan.maxLevel||5;
  const nFromRaw=curPlan.nyumonRange?.from||1, nToRaw=curPlan.nyumonRange?.to||iaChaps.length;
  const cFromRaw=curPlan.chartRange?.from||1,  cToRaw=curPlan.chartRange?.to||(chartChaps?chartChaps.length:0);
  const nFrom=Math.min(nFromRaw,iaChaps.length), nTo=Math.min(nToRaw,iaChaps.length);
  const cFrom=Math.min(cFromRaw,chartChaps?chartChaps.length:0), cTo=Math.min(cToRaw,chartChaps?chartChaps.length:0);
  const curSkipSet=new Set(curPlan.skipItems||[]);
  const hw=calcHomework(curPlan);

  // 手動でstepを切り替える関数
  const setStepIdx=async(idx)=>{
    const newPlan={...curPlanFull,currentIdx:idx===autoCurIdx?null:idx};
    setHsPlans(p=>({...p,[curName]:newPlan}));
    await hsSet(`koukou:plan:${curName}`,newPlan);
    flash(idx===autoCurIdx?'🔄 自動判定に戻しました':'📍 表示テキストを変更');
  };

  // 小中学生用変数
  const jhSi=curType==='jh'?getJhSi(curName):-1;
  const jhFullName=jhSi>=0?jhStudents[jhSi]||'':'';
  const activeGrade=extractGrade(jhFullName);
  const jhSubjects=GRADE_SUBJECTS[activeGrade]||[];
  const activeSubj=activeSubjMap[activeGrade]||jhSubjects[0]||'';
  const setActiveSubj=s=>setActiveSubjMap(p=>({...p,[activeGrade]:s}));
  const jhTextbookKey=(si,subj)=>{
    const grade=extractGrade(jhStudents[si]||'');
    const override=jhTextbookOverrides[si]?.[subj];
    if(override){if(override.startsWith('none_')) return null; return override;}
    if(grade.startsWith('中')) return `${grade}Y_${subj}`;
    // 小学生はデフォルトY（明光式ワーク）
    if(grade.startsWith('小')) return `${grade}Y_${subj}`;
    return `${grade}_${subj}`;
  };
  const chapKey=jhSi>=0?jhTextbookKey(jhSi,activeSubj):null;
  const jhChapters=chapKey?CHAPTERS[chapKey]||[]:[];
  const activeChapIdx=activeChapMap[chapKey]||0;
  const setActiveChap=i=>setActiveChapMap(p=>({...p,[chapKey]:i}));
  const activeChap=jhChapters[activeChapIdx];

  // テスト範囲アラート計算
  const getTestAlert=(si,subj,roundId)=>{
    const fullName=jhStudents[si]||'';
    const sName=fullName.replace(/（.+?）/,'');
    const school=STUDENT_SCHOOLS[sName];
    const grade=extractGrade(fullName);
    if(!school||!grade.startsWith('中')) return null;
    const key=`${school}_${grade}_${roundId}`;
    const range=jhTestRanges[key];
    if(!range) return null;
    const endId=subj==='数学'?range.mathEnd:range.engEnd;
    const startId=subj==='数学'?range.mathStart:range.engStart;
    if(!endId&&!startId) return null;
    const tKey=jhSi>=0?jhTextbookKey(jhSi,subj):null;
    if(!tKey) return null;
    const chs=CHAPTERS[tKey]||[];
    const allItems=chs.flatMap(ch=>ch.items);
    const endIdx=endId?allItems.findIndex(it=>it.id===endId):-1;
    const startIdx=startId?allItems.findIndex(it=>it.id===startId):-1;
    if(endIdx<0) return null;
    const endRecord=jhGetRecord(si,`${subj}_${endId}`);
    if(endRecord.status==='◯') return{type:'done',startId,endId,startIdx,endIdx,
      msg:`🚨 ${subj}テスト範囲終了！折り返して復習してください`,color:'#fef2f2',border:'#f87171'};
    let completedCount=0;
    for(let i=0;i<=endIdx;i++){
      if(jhGetRecord(si,`${subj}_${allItems[i].id}`).status==='◯') completedCount++;
    }
    const remaining=(endIdx+1)-completedCount;
    if(remaining<=3) return{type:'warn',startId,endId,startIdx,endIdx,
      msg:`⚠️ ${subj}テスト範囲まであと${remaining}項目！`,color:'#fefce8',border:'#fbbf24'};
    return{type:'normal',startId,endId,startIdx,endIdx,
      msg:null,color:null,border:null};
  };
  const curTestAlert=jhSi>=0&&isChu(activeGrade)?getTestAlert(jhSi,activeSubj,activeTestRound):null;

  return(
    <div style={{minHeight:'100vh',background:'#f9fafb',fontSize:'14px'}}>
      {/* ヘッダー */}
      <div style={{background:'#1e3a8a',color:'white',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'8px',position:'sticky',top:0,zIndex:20}}>
        <div>
          <p style={{fontWeight:'bold',fontSize:'15px'}}>📘 明光義塾 新屋敷 チェックアプリ</p>
          <p style={{color:'#93c5fd',fontSize:'11px'}}>👨‍🏫 {selTeacher}　｜　{selStudents.length}人表示中</p>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          {saveMsg&&<span style={{color:'#86efac',fontSize:'12px',fontWeight:'bold'}}>{saveMsg}</span>}
          {bgLoading&&<span style={{color:'#fde68a',fontSize:'11px',fontWeight:'bold',background:'rgba(0,0,0,0.2)',padding:'3px 8px',borderRadius:'10px'}}>⏳ 最新データ取得中...</span>}
          {curType==='jh'&&isChu(activeGrade)&&(
            <select value={activeTestRound} onChange={e=>setActiveTestRound(e.target.value)}
              style={{background:'rgba(255,255,255,0.15)',color:'white',border:'1px solid rgba(255,255,255,0.3)',borderRadius:'6px',padding:'4px 8px',fontSize:'11px',cursor:'pointer'}}>
              {TEST_ROUNDS.map(r=><option key={r.id} value={r.id} style={{color:'black'}}>{r.label}</option>)}
            </select>
          )}
          <button onClick={()=>setPhase('students')}
            style={{background:'rgba(255,255,255,0.2)',color:'white',border:'none',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',cursor:'pointer'}}>
            ← 生徒選択
          </button>
        </div>
      </div>

      <div style={{display:'flex',minHeight:'calc(100vh - 50px)'}}>
        {/* サイドバー */}
        <div style={{width:'150px',background:'white',borderRight:'1px solid #e5e7eb',flexShrink:0,position:'sticky',top:'50px',height:'calc(100vh - 50px)',overflowY:'auto'}}>
          <div style={{padding:'6px 10px',background:'#f3f4f6',fontWeight:'bold',fontSize:'11px',color:'#4b5563'}}>生徒 {selStudents.length}人</div>
          {selStudents.map((stu,i)=>{
            const n=stripGrade(stu.name);
            const sum=getSummary(i);
            const pct=sum.total>0?Math.round(sum.done/sum.total*100):0;
            const isHs=stu.type==='hs';
            const plan=isHs?(hsPlans[n]||{}):null;
            const ss=plan?.textbookSet?SETS[plan.textbookSet]:null;
            const g=(stu.name.match(/（(.+?)）/)||[])[1]||'';
            return(
              <button key={i} onClick={()=>setActiveStudentIdx(i)}
                style={{width:'100%',padding:'8px 10px',border:'none',borderBottom:'1px solid #f3f4f6',
                  background:activeStudentIdx===i?'#eff6ff':'white',cursor:'pointer',textAlign:'left'}}>
                <div style={{display:'flex',alignItems:'center',gap:'4px',marginBottom:'2px'}}>
                  <span style={{fontSize:'9px',padding:'1px 4px',borderRadius:'3px',
                    background:isHs?'#dbeafe':'#dcfce7',color:isHs?'#1e3a8a':'#065f46',fontWeight:'bold'}}>{g}</span>
                </div>
                <p style={{fontWeight:activeStudentIdx===i?'bold':'normal',fontSize:'12px',color:activeStudentIdx===i?'#1e3a8a':'#374151',marginBottom:'3px'}}>{n}</p>
                {ss&&<p style={{fontSize:'9px',color:ss.color,marginBottom:'2px'}}>{ss.short}</p>}
                <div style={{display:'flex',alignItems:'center',gap:'3px'}}>
                  <div style={{flex:1,height:'3px',background:'#e5e7eb',borderRadius:'2px',overflow:'hidden'}}>
                    <div style={{width:`${pct}%`,height:'100%',background:pct===100?'#10b981':'#3b82f6',borderRadius:'2px'}}/>
                  </div>
                  <span style={{fontSize:'9px',color:'#6b7280'}}>{pct}%</span>
                </div>
              </button>
            );
          })}
        </div>

        {/* メインコンテンツ */}
        <div style={{flex:1,padding:'12px',overflowY:'auto'}}>

          {/* ── 高校生チェック画面 ── */}
          {curType==='hs'&&(
            <>
              {showHsAdjustModal&&<HsAdjustModal curName={curName} curPlan={curPlan}
                setF={(f,v)=>{
                  const newPlan={...(hsPlans[curName]||{})};
                  // ロードマップ内のステップを更新
                  if(curRoadmap.length>0&&stepIdx>=0){
                    const newRoadmap=[...curRoadmap];
                    newRoadmap[stepIdx]={...newRoadmap[stepIdx],[f]:v};
                    newPlan.roadmap=newRoadmap;
                  }else{
                    newPlan[f]=v;
                  }
                  setHsPlans(p=>({...p,[curName]:newPlan}));
                  hsSet(`koukou:plan:${curName}`,newPlan);
                }}
                setNR={(f,v)=>{
                  const newPlan={...(hsPlans[curName]||{})};
                  if(curRoadmap.length>0&&stepIdx>=0){
                    const newRoadmap=[...curRoadmap];
                    const cur=newRoadmap[stepIdx]||{};
                    newRoadmap[stepIdx]={...cur,nyumonRange:{...(cur.nyumonRange||{}),[f]:v}};
                    newPlan.roadmap=newRoadmap;
                  }else{
                    newPlan.nyumonRange={...(newPlan.nyumonRange||{}),[f]:v};
                  }
                  setHsPlans(p=>({...p,[curName]:newPlan}));
                  hsSet(`koukou:plan:${curName}`,newPlan);
                }}
                setCR={(f,v)=>{
                  const newPlan={...(hsPlans[curName]||{})};
                  if(curRoadmap.length>0&&stepIdx>=0){
                    const newRoadmap=[...curRoadmap];
                    const cur=newRoadmap[stepIdx]||{};
                    newRoadmap[stepIdx]={...cur,chartRange:{...(cur.chartRange||{}),[f]:v}};
                    newPlan.roadmap=newRoadmap;
                  }else{
                    newPlan.chartRange={...(newPlan.chartRange||{}),[f]:v};
                  }
                  setHsPlans(p=>({...p,[curName]:newPlan}));
                  hsSet(`koukou:plan:${curName}`,newPlan);
                }}
                selSet={curSet} hw={hw}
                save={async()=>{
                  await hsSet(`koukou:plan:${curName}`,hsPlans[curName]||{});
                  flash('💾 保存しました');
                  setShowHsAdjustModal(false);
                }}
                msg={saveMsg}
                onClose={()=>setShowHsAdjustModal(false)}/>}

              {/* 左右2:1 レイアウト（最小幅900pxで強制グリッド） */}
              <div style={{display:'grid',gridTemplateColumns:'minmax(0,2fr) minmax(280px,1fr)',gap:'12px',alignItems:'start'}}>

                {/* 左2/3：チェック画面エリア */}
                <div>
                  {/* 生徒情報ヘッダー（コンパクト版） */}
                  <div style={{background:'white',borderRadius:'10px',padding:'10px 14px',marginBottom:'10px',boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
                    <p style={{fontWeight:'bold',fontSize:'17px',color:'#1e3a8a',marginBottom:'4px'}}>{curName}</p>
                    {curSet
                      ?<div style={{display:'flex',flexWrap:'wrap',gap:'6px',alignItems:'center'}}>
                        <span style={{display:'inline-block',padding:'3px 10px',borderRadius:'4px',background:curSet.bg,color:curSet.color,border:`1px solid ${curSet.border}`,fontWeight:'bold',fontSize:'12px'}}>
                          📖 入門精講（{nyumonLabel}）＋ {curSet.label}
                        </span>
                        {curPlan.maxLevel&&curPlan.maxLevel<5&&(
                          <span style={{display:'inline-block',padding:'2px 8px',borderRadius:'4px',background:COMPASS_COLOR[curPlan.maxLevel],fontSize:'12px',color:'#374151'}}>
                            🧭 Lv{curPlan.maxLevel}まで
                          </span>
                        )}
                      </div>
                      :<span style={{fontSize:'12px',color:'#f59e0b'}}>⚠️ テキスト未設定</span>
                    }
                    {curPlanFull.memo&&<p style={{marginTop:'6px',fontSize:'12px',color:'#374151',background:'#fffbeb',borderRadius:'6px',padding:'6px 10px',border:'1px solid #fde68a'}}>📝 {curPlanFull.memo}</p>}
                  </div>

                  {/* チェックリスト */}
                  {!curSet&&<div style={{background:'white',borderRadius:'10px',padding:'32px',textAlign:'center',color:'#6b7280'}}><p style={{fontSize:'24px',marginBottom:'8px'}}>📚</p><p>テキストが未設定です</p><p style={{fontSize:'12px',marginTop:'8px'}}>右側のロードマップから現在のテキストを選択するか、教室長に登録を依頼してください</p></div>}
                  {curSet&&(()=>{
                    const maxLen=Math.max(iaChaps.length,chartChaps?chartChaps.length:0);
                    const blocks=[];
                    for(let i=0;i<maxLen;i++){
                      const chNo=i+1;
                      const nVis=(chNo>=nFrom&&chNo<=nTo);
                      const cVis=(chNo>=cFrom&&chNo<=cTo);
                      if(!nVis&&!cVis) continue;
                      blocks.push(
                        <ChapterBlock key={i}
                          nyumonChap={nVis&&iaChaps[i]?iaChaps[i]:null}
                          chartChap={cVis&&chartChaps&&chartChaps[i]?chartChaps[i]:null}
                          chartSet={curSet}
                          rec={hsRecords[curName]||{}}
                          onCycle={hsCycleStatus}
                          activeHint={activeHint}
                          setActiveHint={setActiveHint}
                          maxLevel={lv}
                          skipKeys={curSkipSet}
                          onSkipToggle={hsSkipToggle}
                        />
                      );
                    }
                    return blocks;
                  })()}
                </div>

                {/* 右1/3：全体像 + 宿題シミュレーション */}
                <div style={{position:'sticky',top:'60px',display:'flex',flexDirection:'column',gap:'10px'}}>

                  {/* 右上：ロードマップ全体像 */}
                  <div style={{background:'white',borderRadius:'10px',padding:'12px',boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
                    <p style={{fontSize:'12px',fontWeight:'bold',color:'#1e3a8a',marginBottom:'8px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span>🛣️ 受験までのロードマップ</span>
                      {curPlanFull.currentIdx!==null&&curPlanFull.currentIdx!==undefined&&(
                        <button onClick={()=>setStepIdx(autoCurIdx)} style={{fontSize:'9px',background:'#fef3c7',color:'#92400e',border:'none',borderRadius:'4px',padding:'2px 6px',cursor:'pointer'}}>🔄 自動</button>
                      )}
                    </p>
                    {curRoadmap.length===0?(
                      <div style={{padding:'12px',background:'#fef3c7',borderRadius:'6px',fontSize:'11px',color:'#92400e',textAlign:'center'}}>
                        ⚠️ 教室長にテキスト登録を依頼してください
                      </div>
                    ):(
                      <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
                        {curRoadmap.map((step,i)=>{
                          const ts=SETS[step.textbookSet];
                          if(!ts) return null;
                          const isCur=i===stepIdx;
                          const isDone=isStepDone(step,curRecords,curSkipItems);
                          const prog=getStepProgress(step,curRecords,curSkipItems);
                          return(
                            <React.Fragment key={i}>
                              <button onClick={()=>setStepIdx(i)}
                                title={`${ts.label} : ${prog.done}/${prog.total} (${prog.pct}%)`}
                                style={{
                                  padding:'8px 10px',borderRadius:'8px',
                                  border:isCur?`2px solid ${ts.color}`:`1px solid ${ts.border}`,
                                  background:isCur?ts.bg:isDone?'#dcfce7':'white',
                                  opacity:!isCur&&!isDone?0.6:1,
                                  cursor:'pointer',textAlign:'left',
                                  display:'flex',alignItems:'center',gap:'8px'
                                }}>
                                <span style={{background:isCur?ts.color:isDone?'#065f46':'#9ca3af',color:'white',width:'20px',height:'20px',borderRadius:'50%',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'bold',flexShrink:0}}>
                                  {isDone?'✓':i+1}
                                </span>
                                <div style={{flex:1,minWidth:0}}>
                                  <p style={{fontSize:'11px',fontWeight:isCur?'bold':'normal',color:isCur?ts.color:isDone?'#065f46':'#6b7280',marginBottom:'2px'}}>
                                    {ts.label}
                                  </p>
                                  <div style={{height:'4px',background:'#e5e7eb',borderRadius:'2px',overflow:'hidden'}}>
                                    <div style={{width:`${prog.pct}%`,height:'100%',background:isDone?'#10b981':ts.color}}/>
                                  </div>
                                  <p style={{fontSize:'9px',color:'#9ca3af',marginTop:'2px'}}>{prog.done}/{prog.total}問 ({prog.pct}%)</p>
                                  {(step.startDate||step.deadline)&&(
                                    <p style={{fontSize:'9px',color:isCur?ts.color:'#9ca3af',marginTop:'2px',fontWeight:isCur?'bold':'normal'}}>
                                      📅 {step.startDate?step.startDate.replace(/-/g,'/'):'未設定'} 〜 {step.deadline?step.deadline.replace(/-/g,'/'):'未設定'}
                                    </p>
                                  )}
                                </div>
                              </button>
                              {i<curRoadmap.length-1&&(
                                <div style={{textAlign:'center',color:'#9ca3af',fontSize:'10px',lineHeight:1}}>↓</div>
                              )}
                            </React.Fragment>
                          );
                        })}
                      </div>
                    )}
                  </div>

                  {/* 右下：宿題シミュレーション */}
                  {curSet&&(
                    <div style={{background:'linear-gradient(135deg,#1e3a8a,#065f46)',borderRadius:'10px',padding:'12px',color:'white',boxShadow:'0 2px 6px rgba(0,0,0,.15)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px',flexWrap:'wrap',gap:'4px'}}>
                        <p style={{fontWeight:'bold',fontSize:'12px'}}>📊 宿題量シミュレーション</p>
                        <button onClick={()=>setShowHsAdjustModal(true)}
                          style={{background:'rgba(255,255,255,0.25)',color:'white',border:'none',borderRadius:'4px',padding:'3px 8px',fontSize:'10px',cursor:'pointer',fontWeight:'bold'}}>
                          ⚙ 調整
                        </button>
                      </div>
                      {hw?(
                        <>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',marginBottom:'6px'}}>
                          <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'6px',padding:'6px',textAlign:'center'}}>
                            <p style={{fontSize:'9px',opacity:0.8}}>入門精講</p>
                            <p style={{fontSize:'15px',fontWeight:'bold'}}>{hw.nTotal}問</p>
                          </div>
                          <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'6px',padding:'6px',textAlign:'center'}}>
                            <p style={{fontSize:'9px',opacity:0.8}}>チャート</p>
                            <p style={{fontSize:'15px',fontWeight:'bold'}}>{hw.cTotal}問</p>
                          </div>
                        </div>
                        <div style={{background:'rgba(255,255,255,0.2)',borderRadius:'6px',padding:'8px',textAlign:'center'}}>
                          <p style={{fontSize:'10px',opacity:0.8}}>合計 {hw.total}問 ÷ {hw.weeks}週</p>
                          <p style={{fontSize:'18px',fontWeight:'bold',marginTop:'2px'}}>週{hw.perWeek}問<br/>1日{hw.perDay}問</p>
                        </div>
                        </>
                      ):(
                        <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'6px',padding:'10px',textAlign:'center',fontSize:'10px'}}>
                          💡 ⚙調整から開始日・期限を設定
                        </div>
                      )}
                    </div>
                  )}
                </div>

              </div>
            </>
          )}

          {/* ── 小中学生チェック画面 ── */}
          {curType==='jh'&&(
            <>
              <div style={{background:'white',borderRadius:'10px',padding:'12px 14px',marginBottom:'10px',boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'8px'}}>
                  <div>
                    <p style={{fontWeight:'bold',fontSize:'17px',color:GRADE_COLORS[activeGrade]||'#4f46e5',marginBottom:'2px'}}>{jhFullName}</p>
                  </div>
                  <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                    <button onClick={()=>setShowTextbookModal(true)} style={{background:'#eef2ff',color:'#4f46e5',border:'none',borderRadius:'6px',padding:'4px 10px',fontSize:'12px',cursor:'pointer'}}>📚 テキスト</button>
                    {isChu(activeGrade)&&<button onClick={()=>setShowTestRangeModal(true)} style={{background:'#fef3c7',color:'#92400e',border:'none',borderRadius:'6px',padding:'4px 10px',fontSize:'12px',cursor:'pointer'}}>📝 テスト範囲</button>}
                    <button onClick={()=>setShowDirectiveModal(true)} style={{background:'#f0fdf4',color:'#065f46',border:'none',borderRadius:'6px',padding:'4px 10px',fontSize:'12px',cursor:'pointer'}}>📢 方針</button>
                  </div>
                </div>
                {jhSubjects.length>1&&(
                  <div style={{display:'flex',gap:'6px',marginTop:'10px'}}>
                    {jhSubjects.map(subj=>(
                      <button key={subj} onClick={()=>setActiveSubj(subj)}
                        style={{padding:'5px 14px',borderRadius:'20px',border:'none',
                          background:activeSubj===subj?SUBJECT_COLOR[subj]:'#e5e7eb',
                          color:activeSubj===subj?'white':'#6b7280',fontWeight:activeSubj===subj?'bold':'normal',cursor:'pointer',fontSize:'13px'}}>
                        {subj}
                      </button>
                    ))}
                  </div>
                )}
              </div>

              {/* モーダル */}
              {showTextbookModal&&jhSi>=0&&<TextbookModal si={jhSi} students={jhStudents} textbookOverrides={jhTextbookOverrides} onSave={jhSaveTextbook} onClose={()=>setShowTextbookModal(false)}/>}
              {showTestRangeModal&&<TestRangeModal onClose={()=>setShowTestRangeModal(false)} testRanges={jhTestRanges} onSave={jhSaveTestRange}/>}
              {showDirectiveModal&&<DirectiveModal directives={jhDirectives} onSave={(k,v)=>{jhSaveDirective(k,v);setShowDirectiveModal(false);}} onClose={()=>setShowDirectiveModal(false)}/>}

              {/* テスト範囲アラートバナー */}
              {curTestAlert&&curTestAlert.color&&(
                <div style={{marginBottom:'8px',padding:'10px 14px',borderRadius:'8px',
                  background:curTestAlert.color,border:`1px solid ${curTestAlert.border}`,
                  fontSize:'13px',fontWeight:'bold',color:'#374151'}}>
                  {curTestAlert.msg}
                </div>
              )}
              {curTestAlert&&!curTestAlert.color&&(
                <div style={{marginBottom:'8px',padding:'8px 14px',borderRadius:'8px',
                  background:'#eff6ff',border:'1px solid #bfdbfe',fontSize:'12px',color:'#1e3a8a'}}>
                  🎯 テスト予測範囲：設定済み（{activeSubj}）
                </div>
              )}

              {/* 章タブ */}
              {jhChapters.length>0&&(
                <div style={{display:'flex',gap:'6px',overflowX:'auto',paddingBottom:'6px',marginBottom:'10px'}}>
                  {jhChapters.map((ch,i)=>{
                    const done=ch.items.filter(it=>jhGetRecord(jhSi,`${activeSubj}_${it.id}`).status==='◯').length;
                    const pct=ch.items.length>0?Math.round(done/ch.items.length*100):0;
                    const isAct=activeChapIdx===i;
                    const col=SUBJECT_COLOR[activeSubj]||'#4f46e5';
                    // 章がテスト範囲内かチェック
                    const chapInRange=curTestAlert&&curTestAlert.startIdx>=0&&curTestAlert.endIdx>=0&&(()=>{
                      const tKey=jhTextbookKey(jhSi,activeSubj);
                      const chs2=CHAPTERS[tKey]||[];
                      const allItems=chs2.flatMap(c=>c.items);
                      const startGlobal=allItems.findIndex(x=>x.id===ch.items[0]?.id);
                      const endGlobal=allItems.findIndex(x=>x.id===ch.items[ch.items.length-1]?.id);
                      return endGlobal>=curTestAlert.startIdx&&startGlobal<=curTestAlert.endIdx;
                    })();
                    return(
                      <button key={i} onClick={()=>setActiveChap(i)}
                        style={{flexShrink:0,padding:'8px 12px',borderRadius:'8px',
                          border:`2px solid ${isAct?col:chapInRange?'#f59e0b':'#e0e7ff'}`,
                          background:isAct?col:chapInRange?'#fffde7':'white',
                          color:isAct?'white':'#374151',cursor:'pointer',fontSize:'12px',fontWeight:isAct?'bold':'normal',minWidth:'80px',textAlign:'center'}}>
                        <div>{ch.name}</div>
                        <div style={{fontSize:'10px',opacity:.8}}>{pct}%</div>
                      </button>
                    );
                  })}
                </div>
              )}

              {/* テスト範囲バナー（どの単元からどの単元か表示） */}
              {jhSi>=0&&isChu(activeGrade)&&(()=>{
                const sName=(jhFullName||'').replace(/（.+?）/,'');
                const school=STUDENT_SCHOOLS[sName];
                if(!school) return null;
                const rk=`${school}_${activeGrade}_${activeTestRound}`;
                const rng=jhTestRanges[rk];
                if(!rng) return null;
                const isEng=activeSubj==='英語';
                const startId=isEng?rng.engStart:rng.mathStart;
                const endId=isEng?rng.engEnd:rng.mathEnd;
                if(!endId&&!startId) return null;
                const tKey=jhTextbookKey(jhSi,activeSubj);
                const allItems=(CHAPTERS[tKey]||[]).flatMap(c=>c.items);
                const startItem=allItems.find(it=>it.id===startId);
                const endItem=allItems.find(it=>it.id===endId);
                const rLabel=TEST_ROUNDS.find(r=>r.id===activeTestRound)?.label||'';
                return(
                  <div style={{background:'#fff7ed',border:'2px solid #f97316',borderRadius:'8px',padding:'8px 14px',marginBottom:'10px',display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
                    <span style={{fontSize:'14px'}}>🎯</span>
                    <span style={{fontWeight:'bold',fontSize:'12px',color:'#c2410c'}}>{rLabel} {activeSubj}テスト予想範囲</span>
                    <span style={{fontSize:'12px',color:'#9a3412'}}>
                      {startItem?startItem.text.slice(0,14)+'…':'（開始未設定）'}
                      　〜　
                      <span style={{fontWeight:'bold',textDecoration:'underline'}}>{endItem?endItem.text.slice(0,14)+'…':'（終了未設定）'}</span>
                    </span>
                  </div>
                );
              })()}

              {/* 項目リスト */}
              {activeChap&&jhSi>=0&&(()=>{
                const sName=(jhFullName||'').replace(/（.+?）/,'');
                const school=STUDENT_SCHOOLS[sName];
                const rk=school?`${school}_${activeGrade}_${activeTestRound}`:null;
                const rng=rk?jhTestRanges[rk]:null;
                const isEng=activeSubj==='英語';
                const rangeStartId=rng?(isEng?rng.engStart:rng.mathStart):'';
                const rangeEndId=rng?(isEng?rng.engEnd:rng.mathEnd):'';
                const items=activeChap.items||[];
                const skKey=`${activeGrade}_${activeSubj}`;
                const skList=jhSkipItems[skKey]||[];
                const isSkipped=id=>skList.includes(id);
                const tKey=jhTextbookKey(jhSi,activeSubj);
                const allItemsGlobal=(CHAPTERS[tKey]||[]).flatMap(c=>c.items);
                const globalStartIdx=rangeStartId?allItemsGlobal.findIndex(x=>x.id===rangeStartId):-1;
                const globalEndIdx=rangeEndId?allItemsGlobal.findIndex(x=>x.id===rangeEndId):-1;
                const chapFirstGlobal=items.length>0?allItemsGlobal.findIndex(x=>x.id===items[0].id):-1;
                return(
                <div style={{background:'white',borderRadius:'10px',overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
                  <div style={{padding:'8px 14px',background:SUBJECT_COLOR[activeSubj]||'#4f46e5',color:'white',fontWeight:'bold',fontSize:'14px'}}>
                    {activeChap.name}
                  </div>
                  {items.map((it,idx)=>{
                    const r=jhGetRecord(jhSi,`${activeSubj}_${it.id}`);
                    const st=r.status;
                    const skipped=isSkipped(it.id);
                    let inRange=false;
                    if(globalStartIdx>=0&&globalEndIdx>=0&&chapFirstGlobal>=0){
                      const globalIdx=chapFirstGlobal+idx;
                      inRange=globalIdx>=globalStartIdx&&globalIdx<=globalEndIdx;
                    }
                    const isStart=rangeStartId&&it.id===rangeStartId;
                    const isEnd=rangeEndId&&it.id===rangeEndId;
                    const rowBg=skipped?'#f3f4f6':isEnd?'#fff7ed':inRange?'#fefce8':st!=='未'?STATUS_BG[st]:'white';
                    const borderBottom=isEnd?'2px solid #f97316':'1px solid #f3f4f6';
                    return(
                      <div key={it.id} style={{borderBottom,background:rowBg,opacity:skipped?0.65:1}}>
                        <div style={{display:'flex',alignItems:'center',gap:'8px',padding:'8px 12px'}}>
                          <span style={{color:'#9ca3af',fontSize:'11px',minWidth:'20px'}}>{idx+1}</span>
                          {skipped?(
                            <span style={{minWidth:'44px',padding:'4px 8px',borderRadius:'6px',background:'#e5e7eb',color:'#9ca3af',fontWeight:'bold',fontSize:'13px',textAlign:'center'}}>—</span>
                          ):(
                            <button onClick={()=>jhCycleStatus(jhSi,`${activeSubj}_${it.id}`)}
                              style={{minWidth:'44px',padding:'4px 8px',borderRadius:'6px',border:'none',
                                background:STATUS_BG[st],color:STATUS_COLOR[st],fontWeight:'bold',fontSize:'13px',cursor:'pointer'}}>
                              {st}
                            </button>
                          )}
                          <div style={{flex:1,fontSize:'13px',display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
                            {isEnd&&!skipped&&<span style={{background:'#f97316',color:'white',fontSize:'10px',fontWeight:'bold',borderRadius:'4px',padding:'1px 6px',whiteSpace:'nowrap'}}>🎯ゴール</span>}
                            {isStart&&!isEnd&&!skipped&&<span style={{background:'#3b82f6',color:'white',fontSize:'10px',fontWeight:'bold',borderRadius:'4px',padding:'1px 6px',whiteSpace:'nowrap'}}>📌スタート</span>}
                            {skipped&&<span style={{background:'#9ca3af',color:'white',fontSize:'10px',fontWeight:'bold',borderRadius:'4px',padding:'1px 6px',whiteSpace:'nowrap'}}>⏭ 飛ばして次へ</span>}
                            <span style={{color:skipped?'#9ca3af':'#1f2937',textDecoration:skipped?'line-through':'none'}}>{it.text}</span>
                          </div>
                          {!skipped&&st!=='未'&&r.teacher&&<span style={{fontSize:'10px',color:'#9ca3af',flexShrink:0}}>{r.teacher}{r.date?' · '+r.date:''}</span>}
                          <button onClick={()=>jhToggleSkip(activeGrade,activeSubj,it.id)}
                            title={skipped?'スキップ解除':'この単元をスキップ'}
                            style={{background:skipped?'#fee2e2':'#f3f4f6',color:skipped?'#dc2626':'#9ca3af',
                              border:'none',borderRadius:'4px',padding:'3px 8px',fontSize:'11px',cursor:'pointer',
                              fontWeight:skipped?'bold':'normal',flexShrink:0}}>
                            {skipped?'✕解除':'⏭'}
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
                );
              })()}
              {jhChapters.length===0&&<div style={{background:'white',borderRadius:'10px',padding:'24px',textAlign:'center',color:'#6b7280'}}><p>受講なし（{activeSubj}）</p></div>}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);</script>
</body>
</html>
